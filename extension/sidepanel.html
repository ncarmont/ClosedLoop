<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
    }
    .logo { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
    .badge {
      font-size: 9px; font-weight: 600;
      background: #7c3aed; color: #fff;
      padding: 2px 5px; border-radius: 3px; letter-spacing: 0.5px;
    }
    .header-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #64748b;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot.on    { background: #22c55e; box-shadow: 0 0 5px #22c55e80; }
    .dot.off   { background: #ef4444; }
    .dot.agent { background: #a78bfa; box-shadow: 0 0 5px #a78bfa80; }
    .dot.pulse { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }

    /* ── Banner shown when agent is active ── */
    .agent-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #1e1b4b;
      border-bottom: 1px solid #312e81;
      font-size: 11px;
      color: #a78bfa;
      font-weight: 500;
      flex-shrink: 0;
    }
    .agent-banner.visible { display: flex; }

    /* ── Feed ── */
    .feed {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }
    .feed::-webkit-scrollbar { width: 4px; }
    .feed::-webkit-scrollbar-track { background: transparent; }
    .feed::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #334155;
      font-size: 13px;
      gap: 8px;
      text-align: center;
      padding: 24px;
    }
    .empty-icon { font-size: 28px; opacity: 0.4; }

    /* ── Action entry ── */
    .entry {
      padding: 10px 16px;
      border-bottom: 1px solid #0f1c2e;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .entry-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
    }
    .entry-icon {
      width: 20px; height: 20px;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
    }
    .entry-icon.navigate  { background: #0c2340; color: #38bdf8; }
    .entry-icon.screenshot { background: #0f2230; color: #818cf8; }
    .entry-icon.click     { background: #1a1a2e; color: #c084fc; }
    .entry-icon.type      { background: #0f1f1a; color: #34d399; }
    .entry-icon.context   { background: #1c1a10; color: #fbbf24; }
    .entry-icon.debugger  { background: #1c1010; color: #f87171; }
    .entry-icon.errors    { background: #1c0e0e; color: #fb923c; }
    .entry-icon.default   { background: #1e293b; color: #94a3b8; }

    .entry-label { font-size: 12px; font-weight: 500; color: #e2e8f0; flex: 1; }
    .entry-time  { font-size: 10px; color: #334155; flex-shrink: 0; }

    .entry-url {
      font-size: 10px; color: #475569;
      word-break: break-all;
      margin-top: 1px;
      padding-left: 27px;
    }
    .entry-error {
      font-size: 10px; color: #f87171;
      margin-top: 2px;
      padding-left: 27px;
    }

    /* ── Screenshot thumbnail ── */
    .screenshot-thumb {
      margin-top: 8px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #1e293b;
      background: #0a0f1e;
    }
    .screenshot-thumb img {
      width: 100%;
      display: block;
    }

    /* ── Footer ── */
    .footer {
      padding: 8px 16px;
      border-top: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .footer-count { font-size: 10px; color: #334155; }
    .clear-btn {
      font-size: 10px; color: #475569;
      background: none; border: none; cursor: pointer;
      padding: 2px 6px; border-radius: 4px;
    }
    .clear-btn:hover { background: #1e293b; color: #94a3b8; }
  </style>
</head>
<body>

  <div class="header">
    <span class="logo">ClosedLoop</span>
    <span class="badge">BETA</span>
    <div class="header-status">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Checking...</span>
    </div>
  </div>

  <div class="agent-banner" id="agent-banner">
    <div class="dot agent pulse"></div>
    AI agent is active
  </div>

  <div class="feed" id="feed">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">⬡</div>
      <div>No actions yet.</div>
      <div style="font-size:11px; color:#1e3a5f; margin-top:4px;">Actions will appear here as the AI uses the browser.</div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-count" id="footer-count">0 actions</span>
    <button class="clear-btn" id="clear-btn">Clear history</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
